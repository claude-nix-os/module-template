name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate module manifest
        run: |
          node -e "
            const manifest = require('./claudeos-module.json');
            const required = ['name', 'version', 'description', 'main'];
            const missing = required.filter(f => !manifest[f]);
            if (missing.length) {
              console.error('Missing required manifest fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('Module manifest is valid');
          "
